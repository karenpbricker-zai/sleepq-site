<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SleepQ - Twitter Post</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f0f0f0;
            padding: 20px;
        }

        .container {
            width: 1600px;
            height: 900px;
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, #0A1628 0%, #1a3a5d 50%, #0A1628 100%);
        }

        /* Main content grid */
        .content-wrapper {
            position: relative;
            height: 100%;
            display: flex;
            align-items: center;
            padding: 80px 100px;
            z-index: 2;
        }

        /* Left side - quote text */
        .left-content {
            flex: 0.6;
            padding-right: 60px;
        }

        .quote {
            font-size: 62px;
            font-weight: 800;
            color: #FFFFFF;
            line-height: 1.25;
            letter-spacing: -1.5px;
            margin-bottom: 40px;
            position: relative;
        }

        .quote::before {
            content: '"';
            position: absolute;
            left: -40px;
            top: -20px;
            font-size: 120px;
            color: rgba(245, 166, 35, 0.2);
            font-weight: 700;
            line-height: 1;
        }

        /* Right side - phone mockups */
        .right-content {
            flex: 0.5;
            position: relative;
            height: 100%;
            display: flex;
            justify-content: flex-end;
            align-items: center;
        }

        .phone-mockup {
            position: relative;
            width: 240px;
            height: 480px;
            background: #000;
            border-radius: 36px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), inset 0 0 0 10px #1a1a1a;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .phone-mockup.phone-1 {
            z-index: 3;
            transform: translateX(0);
        }

        .phone-mockup.phone-2 {
            position: absolute;
            right: 0;
            z-index: 2;
            transform: translateX(80px);
            opacity: 0.9;
        }

        .phone-screen {
            width: 91%;
            height: 96%;
            background-size: cover;
            background-position: center;
            border-radius: 32px;
        }

        .phone-screen.screen-1 {
            background-image: url('../IMG_0314.png');
        }

        .phone-screen.screen-2 {
            background-image: url('../IMG_0315.png');
        }

        /* Bottom bar */
        .bottom-bar {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 70px;
            background: linear-gradient(90deg, rgba(10, 22, 40, 0.95) 0%, rgba(26, 58, 93, 0.95) 100%);
            border-top: 1px solid rgba(245, 166, 35, 0.25);
            display: flex;
            align-items: center;
            justify-content: flex-start;
            padding: 0 100px;
            gap: 50px;
        }

        .logo-section {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 700;
            color: #FFFFFF;
            letter-spacing: 0.5px;
        }

        .logo-mark {
            width: 24px;
            height: 24px;
            background: #F5A623;
            border-radius: 4px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 12px;
            font-weight: 700;
            color: #0A1628;
        }

        .divider {
            width: 1px;
            height: 30px;
            background: rgba(255, 255, 255, 0.2);
        }

        .meta-text {
            font-size: 14px;
            color: #FFFFFF;
            font-weight: 500;
            letter-spacing: 0.2px;
        }

        .meta-text strong {
            color: #F5A623;
            font-weight: 600;
        }

        /* Decorative accent */
        .accent-glow {
            position: absolute;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(245, 166, 35, 0.1) 0%, transparent 70%);
            border-radius: 50%;
            bottom: -150px;
            right: -150px;
            pointer-events: none;
        }

        /* Watermark */
        .watermark {
            position: absolute;
            top: 20px;
            right: 40px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.2);
            font-weight: 600;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="accent-glow"></div>

        <div class="content-wrapper">
            <div class="left-content">
                <p class="quote">What if better sleep was just one experiment away?</p>
            </div>

            <div class="right-content">
                <div class="phone-mockup phone-1">
                    <div class="phone-screen screen-1"></div>
                </div>
                <div class="phone-mockup phone-2">
                    <div class="phone-screen screen-2"></div>
                </div>
            </div>
        </div>

        <div class="bottom-bar">
            <div class="logo-section">
                <div class="logo-mark">Q</div>
                <span class="logo-text">SleepQ</span>
            </div>
            <div class="divider"></div>
            <span class="meta-text">sleepqapp.com</span>
            <div class="divider"></div>
            <span class="meta-text">Launching <strong>June 2026</strong></span>
        </div>

        <div class="watermark">SLEEPQ</div>
    </div>
</body>
</html>
