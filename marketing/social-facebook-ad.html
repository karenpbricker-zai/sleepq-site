<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SleepQ - Facebook Ad</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f0f0f0;
            padding: 20px;
        }

        .container {
            width: 1200px;
            height: 628px;
            position: relative;
            overflow: hidden;
            background: #FFFFFF;
            display: flex;
        }

        /* Left section - text content */
        .left-section {
            flex: 1;
            background: linear-gradient(135deg, #0A1628 0%, #1a2f4d 100%);
            padding: 50px 60px;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            position: relative;
            z-index: 2;
        }

        /* Accent element */
        .accent-circle {
            position: absolute;
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(245, 166, 35, 0.2) 0%, transparent 70%);
            border-radius: 50%;
            bottom: -100px;
            right: -80px;
            pointer-events: none;
        }

        .headline {
            font-size: 54px;
            font-weight: 800;
            color: #FFFFFF;
            line-height: 1.15;
            letter-spacing: -1px;
            margin-bottom: 20px;
        }

        .subheadline {
            font-size: 16px;
            font-weight: 500;
            color: #FFFFFF;
            line-height: 1.6;
            opacity: 0.95;
            max-width: 85%;
        }

        .cta-button {
            align-self: flex-start;
            background: #F5A623;
            color: #0A1628;
            padding: 14px 32px;
            border-radius: 28px;
            font-size: 16px;
            font-weight: 700;
            text-decoration: none;
            letter-spacing: 0.3px;
            box-shadow: 0 8px 24px rgba(245, 166, 35, 0.3);
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 20px;
        }

        .cta-button:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 32px rgba(245, 166, 35, 0.4);
        }

        /* Right section - phone mockup */
        .right-section {
            flex: 1;
            background: linear-gradient(to bottom, #0A1628, #1a3a5d);
            padding: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .phone-mockup {
            position: relative;
            width: 240px;
            height: 480px;
            background: #000;
            border-radius: 36px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), inset 0 0 0 10px #1a1a1a;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .phone-screen {
            width: 91%;
            height: 96%;
            background-size: cover;
            background-position: center;
            background-image: url('../IMG_0312.png');
            border-radius: 32px;
        }

        /* Bottom footer bar */
        .footer {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 60px;
            background: rgba(10, 22, 40, 0.95);
            border-top: 1px solid rgba(245, 166, 35, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 40px;
            font-size: 14px;
            color: #FFFFFF;
            font-weight: 500;
            letter-spacing: 0.2px;
        }

        .footer-text {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .footer-divider {
            width: 1px;
            height: 20px;
            background: rgba(255, 255, 255, 0.2);
        }

        /* Watermark */
        .watermark {
            position: absolute;
            top: 10px;
            right: 20px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.2);
            font-weight: 600;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Left section -->
        <div class="left-section">
            <div class="accent-circle"></div>
            <div>
                <h1 class="headline">Stop Guessing.<br>Start Sleeping.</h1>
                <p class="subheadline">SleepQ's AI coach analyzes your sleep and guides you through experiments proven to improve sleep quality.</p>
                <button class="cta-button">Join Free Waitlist</button>
            </div>
        </div>

        <!-- Right section -->
        <div class="right-section">
            <div class="phone-mockup">
                <div class="phone-screen"></div>
            </div>
        </div>

        <!-- Footer -->
        <div class="footer">
            <span class="footer-text">sleepqapp.com</span>
            <div class="footer-divider"></div>
            <span class="footer-text">Free on the App Store</span>
        </div>

        <!-- Watermark -->
        <div class="watermark">SLEEPQ</div>
    </div>
</body>
</html>
