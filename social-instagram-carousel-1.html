<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SleepQ - App Launch Teaser</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #f0f0f0;
            padding: 20px;
        }

        .container {
            width: 1080px;
            height: 1080px;
            position: relative;
            overflow: hidden;
            background: linear-gradient(135deg, #0A1628 0%, #1a2f4d 50%, #0A1628 100%);
        }

        /* Star pattern background */
        .stars {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
        }

        .star {
            position: absolute;
            width: 2px;
            height: 2px;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
        }

        /* Main content container */
        .content {
            position: relative;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            padding: 80px 60px;
            z-index: 2;
        }

        .headline {
            font-size: 72px;
            font-weight: 800;
            color: #FFFFFF;
            line-height: 1.1;
            margin-bottom: 40px;
            letter-spacing: -1.5px;
        }

        .subheadline {
            font-size: 36px;
            font-weight: 600;
            color: #F5A623;
            margin-bottom: 60px;
        }

        /* Phone mockup container */
        .phone-container {
            position: absolute;
            right: -80px;
            top: 200px;
            width: 380px;
            height: 680px;
            perspective: 1000px;
        }

        .phone-mockup {
            position: relative;
            width: 100%;
            height: 100%;
            background: #000;
            border-radius: 50px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5), inset 0 0 0 12px #1a1a1a;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .phone-screen {
            width: 90%;
            height: 95%;
            background-size: cover;
            background-position: center;
            background-image: url('../IMG_0312.png');
            border-radius: 40px;
            background-clip: padding-box;
            clip-path: polygon(0 0, 100% 0, 100% 100%, 0 100%);
        }

        /* Orange accent line */
        .accent-line {
            position: absolute;
            bottom: 200px;
            left: 60px;
            width: 150px;
            height: 5px;
            background: linear-gradient(90deg, #F5A623 0%, #F5A623 70%, rgba(245, 166, 35, 0) 100%);
            border-radius: 2px;
            box-shadow: 0 0 20px rgba(245, 166, 35, 0.6);
        }

        /* Footer */
        .footer {
            position: absolute;
            bottom: 50px;
            left: 0;
            right: 0;
            text-align: center;
        }

        .logo-text {
            font-size: 24px;
            font-weight: 700;
            color: #FFFFFF;
            letter-spacing: 0.5px;
        }

        .cta-link {
            font-size: 18px;
            color: #F5A623;
            margin-top: 12px;
            font-weight: 600;
            letter-spacing: 0.3px;
        }

        /* Watermark */
        .watermark {
            position: absolute;
            bottom: 20px;
            right: 30px;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.3);
            font-weight: 600;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Star pattern background -->
        <div class="stars" id="starsContainer"></div>

        <!-- Main content -->
        <div class="content">
            <h1 class="headline">Your Sleep Is About to Change</h1>
            <p class="subheadline">SleepQ is coming.</p>
        </div>

        <!-- Phone mockup with app screen -->
        <div class="phone-container">
            <div class="phone-mockup">
                <div class="phone-screen"></div>
            </div>
        </div>

        <!-- Orange accent line -->
        <div class="accent-line"></div>

        <!-- Footer CTA -->
        <div class="footer">
            <div class="logo-text">SleepQ</div>
            <div class="cta-link">Join the waitlist → sleepqapp.com</div>
        </div>

        <!-- Watermark -->
        <div class="watermark">SLEEPQ</div>
    </div>

    <script>
        // Generate star pattern
        const starsContainer = document.getElementById('starsContainer');
        const starCount = 40;
        for (let i = 0; i < starCount; i++) {
            const star = document.createElement('div');
            star.className = 'star';
            star.style.left = Math.random() * 100 + '%';
            star.style.top = Math.random() * 100 + '%';
            star.style.opacity = Math.random() * 0.7 + 0.3;
            starsContainer.appendChild(star);
        }
    </script>
</body>
</html>
