<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SleepQ - Wide Skyscraper Banner</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: #f0f0f0;
            padding: 20px;
        }

        .banner-container {
            width: 160px;
            height: 600px;
            background: linear-gradient(180deg, #0A1628 0%, #0F1E35 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 16px 12px;
            border-radius: 4px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
            position: relative;
            overflow: hidden;
        }

        /* Animated background accent */
        .banner-container::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -30%;
            width: 220px;
            height: 220px;
            background: radial-gradient(circle, rgba(245, 166, 35, 0.12) 0%, transparent 70%);
            animation: pulse-bg 7s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes pulse-bg {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        /* Logo Section */
        .logo-section {
            position: relative;
            z-index: 1;
            margin-bottom: 12px;
        }

        .logo-text {
            font-size: 16px;
            font-weight: 700;
            color: #FFFFFF;
            letter-spacing: -0.5px;
            text-align: center;
        }

        .logo-q {
            color: #F5A623;
        }

        /* Headline */
        .headline {
            font-size: 14px;
            font-weight: 700;
            color: #FFFFFF;
            text-align: center;
            position: relative;
            z-index: 1;
            line-height: 1.2;
            margin-bottom: 14px;
            word-spacing: 100vw;
        }

        /* Phone Stack Container */
        .phone-stack {
            position: relative;
            z-index: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            margin-bottom: 14px;
            flex: 1;
        }

        .phone-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
        }

        .phone-mockup {
            width: 70px;
            height: 100px;
            background: #000;
            border-radius: 10px;
            padding: 4px;
            position: relative;
            box-shadow: 0 3px 12px rgba(0, 0, 0, 0.5);
            border: 2px solid #1a1a1a;
        }

        .phone-mockup img {
            width: 100%;
            height: 100%;
            border-radius: 7px;
            object-fit: cover;
            display: block;
        }

        /* iPhone notch effect */
        .phone-mockup::before {
            content: '';
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 24px;
            height: 5px;
            background: #000;
            border-radius: 0 0 6px 6px;
            z-index: 10;
        }

        .label {
            font-size: 9px;
            font-weight: 700;
            color: #4A90D9;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* CTA Button */
        .cta-button {
            background-color: #F5A623;
            color: #0A1628;
            border: none;
            padding: 9px 14px;
            font-size: 11px;
            font-weight: 700;
            border-radius: 4px;
            cursor: pointer;
            position: relative;
            z-index: 1;
            transition: all 0.3s ease;
            box-shadow: 0 3px 10px rgba(245, 166, 35, 0.35);
            white-space: nowrap;
            width: 100%;
            margin-bottom: 8px;
        }

        .cta-button:hover {
            background-color: #F5B640;
            box-shadow: 0 5px 14px rgba(245, 166, 35, 0.45);
            transform: translateY(-1px);
        }

        .cta-button:active {
            transform: translateY(0);
        }

        /* Pulse animation */
        @keyframes btn-pulse {
            0%, 100% {
                box-shadow: 0 3px 10px rgba(245, 166, 35, 0.35);
            }
            50% {
                box-shadow: 0 5px 14px rgba(245, 166, 35, 0.5);
            }
        }

        .cta-button:hover {
            animation: btn-pulse 2s ease-in-out infinite;
        }

        /* URL at bottom */
        .url {
            font-size: 9px;
            color: #4A90D9;
            font-weight: 700;
            text-align: center;
            position: relative;
            z-index: 1;
            letter-spacing: 0.3px;
        }
    </style>
</head>
<body>
    <div class="banner-container">
        <div class="logo-section">
            <div class="logo-text">Sleep<span class="logo-q">Q</span></div>
        </div>

        <div class="headline">Master Your Rest</div>

        <div class="phone-stack">
            <div class="phone-item">
                <div class="phone-mockup">
                    <img src="images/IMG_0312.png" alt="Track Sleep">
                </div>
                <span class="label">Track</span>
            </div>

            <div class="phone-item">
                <div class="phone-mockup">
                    <img src="images/IMG_0317.png" alt="AI Coach">
                </div>
                <span class="label">Coach</span>
            </div>

            <div class="phone-item">
                <div class="phone-mockup">
                    <img src="images/IMG_0314.png" alt="Improve">
                </div>
                <span class="label">Improve</span>
            </div>
        </div>

        <button class="cta-button">Join Waitlist</button>
        <div class="url">sleepqapp.com</div>
    </div>
</body>
</html>
